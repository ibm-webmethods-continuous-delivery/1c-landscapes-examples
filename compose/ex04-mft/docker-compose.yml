volumes:
  db-data:
    name: ex04-db-data
  mft-root:
    name: ex04-mft-root
  ft-data:
    name: ex04-ft-data
  ft-captures:
    name: ex04-ft-captures
  ft-logs:
    name: ex04-ft-logs
  test-results:
    name: ex04-test-results
  cert-manager-home:
    name: ex04-cert-manager-home
  cert-manager-tmp:
    name: ex04-cert-manager-tmp
  ft-user01-home:
    name: ex04-ft-user01-home
  ft-user02-home:
    name: ex04-ft-user02-home
  ft-shared:
    name: ex04-ft-shared

networks:
  n1:
    external: false

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # Certificate Manager
  # Generates server TLS certificates and client SSH key pairs before any
  # other service starts.
  # ═══════════════════════════════════════════════════════════════════════════
  cert-manager:
    image: cert-manager-u:alpine
    container_name: ex04-cert-manager
    volumes:
      - ./data/subjects:/mnt/data/certmgr
      - ./scripts/cert-manager-entrypoint.sh:/entrypoint.sh:ro
      - cert-manager-home:/home/certmgr
      - cert-manager-tmp:/tmp
    read_only: true
    environment:
      # TEST_PK_SECRET is the harness-level passphrase used by all subjects.
      # Each subject's set-env.sh resolves CRTMGR_PK_PASS from this variable,
      # keeping per-subject scope while enabling fully unattended operation.
      - TEST_PK_SECRET=${EX04_TEST_PK_SECRET}
    command: ["/bin/sh", "/entrypoint.sh"]
    healthcheck:
      # Ready when both the server RSA cert and the ED25519 client key exist
      test:
        - "CMD"
        - "sh"
        - "-c"
        - >-
          test -f /mnt/data/certmgr/01-ft-test/02-ft-server/out/rsa/public.pem.cer &&
          test -f /mnt/data/certmgr/01-ft-test/03-ft-client-keys/ed25519/id_client
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - n1

  db:
    image: ${EX04_POSTGRES_IMAGE}
    # Refer to https://docs.docker.com/guides/databases/
    # about the docker-entrypoint-initdb.d directory
    container_name: ex04-db
    volumes:
      - ./scripts/init/postgres/create-dbs.sh:/docker-entrypoint-initdb.d/create-dbs.sh
      - db-data:${EX04_POSTGRES_DATA_MOUNT_POINT}
    environment:
      - POSTGRES_USER=${EX04_POSTGRES_USER}
      - POSTGRES_PASSWORD=${EX04_POSTGRES_PASS}
      - EX04_WM_DB_NAME
      - EX04_WM_DB_USER_NAME
      - EX04_WM_DB_USER_PASS
      - EX04_WM_ARCHIVE_DB_NAME
      - EX04_WM_ARCHIVE_DB_USER_NAME
      - EX04_WM_ARCHIVE_DB_USER_PASS
    networks:
      n1:
        aliases:
          - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "db_prod"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s

  adminer:
    image: adminer
    container_name: ex04-adminer
    networks:
      - n1
    ports:
      - ${EX04_PORT_PREFIX}80:8080
    depends_on:
      db:
        condition: service_healthy

  mft:
    image: ${EX04_MFT_IMAGE}
    container_name: ex04-mft
    networks:
      - n1
    depends_on:
      db:
        condition: service_healthy
    environment:
      - EX04_WM_DB_NAME
      - EX04_WM_DB_USER_NAME
      - EX04_WM_DB_USER_PASS

      - EX04_WM_ARCHIVE_DB_NAME
      - EX04_WM_ARCHIVE_DB_USER_NAME
      - EX04_WM_ARCHIVE_DB_USER_PASS
    volumes:
      - ./config/mft/application.properties:/opt/softwareag/IntegrationServer/application.properties
      - mft-root:/opt/mft-root
    ports:
      - ${EX04_PORT_PREFIX}55:5555

  # ═══════════════════════════════════════════════════════════════════════════
  # FTP Test Double – Classical (Pre-Quantum)
  # ProFTPD with classical TLS (RSA + ECDHE) and RSA SFTP host key.
  # Ports: 2121 (FTP/FTPES), 2990 (FTPS implicit), 2222 (SFTP)
  # ═══════════════════════════════════════════════════════════════════════════
  ft-test-double:
    image: ft-test-double-u:alpine
    container_name: ex04-ft-test-double
    depends_on:
      cert-manager:
        condition: service_healthy
    ports:
      - "${EX04_PORT_PREFIX}21:2121"         # FTP (plain + STARTTLS / FTPES)
      - "${EX04_PORT_PREFIX}22:2222"         # SFTP
      - "${EX04_PORT_PREFIX}90:2990"         # FTPS implicit
      - "2180-2199:2180-2199"                # Passive data ports
    volumes:
      - ./scripts/ft-test-double-entrypoint.sh:/entrypoint.sh:ro
      - ./config/ft-test-double/proftpd.conf:/etc/proftpd/proftpd.conf:ro
      - ./config/ft-test-double:/etc/ft-test/config:ro
      # Server TLS certificates (RSA)
      - ./data/subjects/01-ft-test/02-ft-server/out/rsa:/etc/proftpd/certs/rsa:ro
      # SSH host keys (ED25519 from cert-manager; RSA generated by entrypoint)
      - ./data/subjects/01-ft-test/02-ft-server/out/ed25519:/etc/proftpd/ssh:ro
      # Client public keys (for SFTP authorized_keys installation)
      - ./data/subjects/01-ft-test/03-ft-client-keys:/run/secrets/ft-client-keys:ro
      - ft-logs:/var/log/proftpd
      - ft-user01-home:/home/ftuser01
      - ft-user02-home:/home/ftuser02
      - ft-shared:/home/ftuser01/shared
      - ft-shared:/home/ftuser02/shared:ro
    environment:
      - CRTMGR_PK_PASS=${EX04_TEST_PK_SECRET}   # passphrase for server TLS private key decryption
      - FT_SFTP_KEY_TYPE=rsa
      - FT_TLS_MODE=classical
      - OPENSSL_CONF=/etc/ft-test/config/openssl-classical.cnf
    entrypoint: /entrypoint.sh
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2121"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      n1:
        aliases:
          - ft-test-double

  # ═══════════════════════════════════════════════════════════════════════════
  # FTP Test Client
  # Runs all scenario combinations against the test-double service.
  # ═══════════════════════════════════════════════════════════════════════════
  ft-test-client:
    image: ft-test-client-u:alpine
    container_name: ex04-ft-test-client
    depends_on:
      cert-manager:
        condition: service_healthy
      ft-test-double:
        condition: service_healthy
    volumes:
      # Harness runner script (injected from the test harness, not the image)
      - ./scripts/run-scenarios.sh:/opt/ft-test-client/scripts/run-scenarios.sh:ro
      # Client SSH key pairs generated by cert-manager
      - ./data/subjects/01-ft-test/03-ft-client-keys:/run/secrets/ft-test-client:ro
      # CA certificate bundle for TLS verification (optional; ssl:verify-certificate no by default)
      - ./data/subjects/01-ft-test/01-ca-ft-test/out/rsa:/run/secrets/ft-ca:ro
      - test-results:/results
    environment:
      # Default credentials (used by all combinations unless overridden by runner)
      # These MUST match the ones used at docker build time for the image
      - FTC_USER=ftuser01
      - FTC_PASS=Manage01
      - FTC_RO_USER=ftuser02
      - FTC_RO_PASS=Manage01
      # ftuser01 uploads to "shared" so ftuser02 can read it from "shared".
      # Both users are chrooted to their own home; "shared" is relative to chroot root.
      # ftuser01: /home/ftuser01/shared (writable named volume)
      # ftuser02: /home/ftuser02/shared (same named volume, mounted :ro)
      - FTC_REMOTE_UPLOAD_DIR=shared
      - FTC_REMOTE_RO_DIR=shared
      - FTC_SSH_KEYS_HOME=/run/secrets/ft-test-client
      - FTC_SSH_KEY_FILENAME=id_client
      # The runner script overrides FTC_HOST, FTC_PORT, FTC_PROTOCOL, FTC_KEY_TYPE
      # per combination, so these are just fallback defaults.
      - FTC_HOST=ft-test-double
      - FTC_PORT=2121
      - FTC_PROTOCOL=ftp
      - FTC_KEY_TYPE=rsa
      - FTC_TRANSFER_MODE=binary
    command: ["/bin/sh", "-c", "echo 'Test client ready. Use docker exec to run tests manually.'; sleep infinity"]
    networks:
      - n1
